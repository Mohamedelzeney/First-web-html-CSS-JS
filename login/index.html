<!doctype html>
<html lang="ar">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Login</title>
    <link rel="stylesheet" href="login.css" />
  </head>

  <body>
    <div class="login-box">
      <h2>تسجيل الدخول</h2>

      <form>
        <div class="input-box">
          <input type="email" placeholder="ادخل البريد الإلكتروني" />
        </div>

        <div class="input-box">
          <input type="password" placeholder="ادخل كلمة المرور" />
        </div>
        <button type="submit">دخول</button>
      </form>

      <div class="text">
        ليس لديك حساب ؟
        <a href="/regest/r.html"> إنشاء حساب </a>
      </div>
    </div>
    <script>
      let form = document.querySelector("form");

      form.addEventListener("submit", function (e) {
        e.preventDefault();

        let email = document.querySelector('input[type="email"]').value;

        let password = document.querySelector('input[type="password"]').value;

        let savedEmail = localStorage.getItem("email");
        let savedPassword = localStorage.getItem("password");
        let role = localStorage.getItem("role");

        if (email === "" || password === "") {
          alert("من فضلك املأ جميع الحقول");
        } else if (email === savedEmail && password === savedPassword) {
          alert("تم تسجيل الدخول بنجاح ");

          // لو عميل
          if (role === "client") {
            window.location.href = "/main/index.html";
          }

          // لو صنايعي
          else if (role === "worker") {
            window.location.href = "/worker/w.html";
          }
        } else {
          alert("الإيميل أو الباسورد غير صحيح");
        }
      });
    </script>
  </body>
</html>
